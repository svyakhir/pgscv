listen_address: "0.0.0.0:9890"

services:
  "postgres":
    service_type: "postgres"
    conninfo: "postgres://dev:dev@localhost:5432/postgres?sslmode=disable"
    data_directory: "/var/lib/postgresql/data"

# Кастомные метрики (аналог queries.yaml)
collectors:
  postgres/custom:
    subsystems:
      connected_clients:  # Показывает, сколько пользователей подключено и к каким базам данных.
#        databases: "postgres"  # Ограничение, для каких баз данных PostgreSQL будет выполняться этот query.
        query: "SELECT client_addr, datname, count(*) AS connected_clients FROM pg_stat_activity WHERE backend_type = 'client backend' GROUP BY 1,2"
        metrics:
          - name: count
            usage: GAUGE
            value: connected_clients
            labels:
              - client_addr
              - datname
            description: "Number of connected clients to Postgresql"

      hit_percent_top:  # Процент того, сколько данных было взято из памяти (RAM), а не с диска
        query: |
          SELECT
              query,
              queryid,
              calls,
              rows,
              shared_blks_hit,
              shared_blks_read,
              ROUND(
                100.0 * shared_blks_hit / NULLIF(shared_blks_hit + shared_blks_read, 0)::NUMERIC,
                2
              ) AS hit_percent,
              ROUND(mean_exec_time::NUMERIC, 2) AS avg_time_ms
          FROM pg_stat_statements
          WHERE shared_blks_hit + shared_blks_read > 100
          ORDER BY hit_percent ASC NULLS LAST
          LIMIT 20
        metrics:
          - name: hit_percent
            usage: GAUGE
            value: hit_percent
            labels:
              - query
              - queryid
            description: "Percent shared blocks hit"